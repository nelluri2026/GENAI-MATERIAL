apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: travel-agent-api
  namespace: travel-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: travel-agent-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: travel-agent-ui
  namespace: travel-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: travel-agent-ui
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
