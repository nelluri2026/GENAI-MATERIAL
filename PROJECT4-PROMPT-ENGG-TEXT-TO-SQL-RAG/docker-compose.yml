version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: olist_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

  rag-ingestion-service:
    build:
      context: .
      dockerfile: 5.rag-ingestion-service/Dockerfile
    env_file:
      - .env
    ports:
      - "8081:8080"
    profiles:
      - rag

  rag-retriever-service:
    build:
      context: .
      dockerfile: 6.rag-retriever-service/Dockerfile
    env_file:
      - .env
    ports:
      - "8082:8080"
    profiles:
      - rag
